<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Minder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Money Minder</h1>
      <p>Track spending, receipts, and transactions in one place.</p>
    </header>

    <main>
      <section class="card">
        <h2>Add Transaction</h2>
        <form id="transaction-form">
          <div class="field-grid">
            <label>
              Date
              <input type="date" id="date" required />
            </label>
            <label>
              Amount
              <input type="number" id="amount" step="0.01" min="0" placeholder="0.00" required />
            </label>
            <label>
              Category
              <select id="category" required>
                <option value="Food">Food</option>
                <option value="Bills">Bills</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Health">Health</option>
                <option value="Other">Other</option>
              </select>
            </label>
            <label>
              Merchant
              <input type="text" id="merchant" placeholder="Store or vendor" required />
            </label>
          </div>
          <label>
            Notes
            <textarea id="notes" rows="2" placeholder="Optional notes"></textarea>
          </label>
          <label>
            Receipt photo
            <input type="file" id="receipt" accept="image/*" />
          </label>
          <button type="submit">Save transaction</button>
        </form>
      </section>

      <section class="card summary">
        <h2>Overview</h2>
        <div class="summary-grid">
          <div>
            <h3>Total Spent</h3>
            <p id="total-spent">$0.00</p>
          </div>
          <div>
            <h3>This Month</h3>
            <p id="month-spent">$0.00</p>
          </div>
          <div>
            <h3>Transactions</h3>
            <p id="tx-count">0</p>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Transactions</h2>
        <div class="filters">
          <input type="text" id="search" placeholder="Search merchant or notes" />
          <select id="filter-category">
            <option value="All">All categories</option>
            <option value="Food">Food</option>
            <option value="Bills">Bills</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <ul id="transaction-list" class="transaction-list"></ul>
      </section>
    </main>

    <template id="transaction-template">
      <li class="transaction-item">
        <div class="top-row">
          <strong class="merchant"></strong>
          <span class="amount"></span>
        </div>
        <div class="meta-row">
          <span class="date"></span>
          <span class="category"></span>
        </div>
        <p class="notes"></p>
        <div class="receipt-wrap hidden">
          <img class="receipt" alt="Receipt image" />
        </div>
        <div class="actions">
          <button class="toggle-receipt" type="button">View receipt</button>
          <button class="delete" type="button">Delete</button>
        </div>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
